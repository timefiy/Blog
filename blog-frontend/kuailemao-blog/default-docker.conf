# Docker 环境 Nginx 配置，/api 代理至 backend 服务
server {
    listen 80;
    server_name zhuyuxi.xyz www.zhuyuxi.xyz;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # /api/* -> backend/*
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $backend_upstream backend:8088;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        client_max_body_size 100M;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name image.zhuyuxi.xyz;

    # image.zhuyuxi.xyz/* -> minio:9000/*
    location / {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $minio_upstream minio:9000;
        proxy_pass http://$minio_upstream;
        client_max_body_size 100M;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}